spring:
  application:
    name: backend-api
  profiles:
    active: dev,local
  # 通用默认配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:scrap_system}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5s
  sql:
    init:
      mode: always # 始终尝试初始化，具体脚本由 profile 决定是否覆盖
      continue-on-error: true # 允许脚本执行报错（例如重复添加列），保证本地开发幂等性

server:
  port: 8090

app:
  security:
    jwt:
      secret: ${JWT_SECRET:r5l0h4jdVSUTwC6AHU9vUiQ8xWOi80I69we3x2wWxHjdD3ZbNYaEfGWECjD4ebKlbgJr-OXAwhltfxrNbqIWyw}
      ttl-seconds: 259200
      issuer: vehicle-recycle-system
  material-price-fetch:
    enabled: true
    cron: "0 30 9,15 * * MON-FRI"
    zone: "Asia/Shanghai"

# 微信小程序配置
wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:wx475e019dd13575e7}
    secret: ${WX_MINIAPP_SECRET:}
    msgDataFormat: JSON
