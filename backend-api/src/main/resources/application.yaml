spring:
  application:
    name: backend-api
  profiles:
    active: dev,local
  # 通用默认配置
  jpa:
    open-in-view: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  sql:
    init:
      mode: always # 始终尝试初始化，具体脚本由 profile 决定是否覆盖
      continue-on-error: true # 允许脚本执行报错（例如重复添加列），保证本地开发幂等性

server:
  port: 8090

app:
  material-price-fetch:
    enabled: true
    cron: "0 30 9,15 * * MON-FRI"
    zone: "Asia/Shanghai"

# 微信小程序配置
wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:wx8888888888888888} # 替换为你的小程序AppID
    secret: ${WX_MINIAPP_SECRET:your_secret_here} # 替换为你的小程序Secret
    msgDataFormat: JSON
